<!DOCTYPE html>

<meta charset="UTF-8">

<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#1d4ed8">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="icon-192.png">
<script>if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js');}</script>

<style>
  :root{
    --bg:#0f172a; --card:#1e293b; --acc:#38bdf8; --acc2:#f59e0b;
    --txt:#f1f5f9; --sub:#94a3b8; --ok:#22c55e; --rec:#ef4444;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{margin:0;font-family:"Hiragino Sans","Yu Gothic",system-ui,sans-serif;background:var(--bg);color:var(--txt);}
  header{padding:14px;text-align:center;background:linear-gradient(135deg,#0ea5e9,#1d4ed8);}
  header h1{margin:0;font-size:1.1rem;}
  header p{margin:4px 0 0;font-size:.72rem;opacity:.85;}
  .progressAll{font-size:.75rem;margin-top:6px;background:rgba(0,0,0,.25);border-radius:10px;padding:4px 10px;display:inline-block;}
  .tabs{display:flex;overflow-x:auto;gap:6px;padding:10px;background:#0b1220;position:sticky;top:0;z-index:5;}
  .tabs button{flex:0 0 auto;border:1px solid #334155;background:var(--card);color:var(--txt);
    padding:8px 12px;border-radius:20px;font-size:.78rem;}
  .tabs button.active{background:var(--acc);color:#03202f;border-color:var(--acc);font-weight:bold;}
  .tabs .done{color:var(--ok);font-weight:bold;}
  .tabs button.active .done{color:#065f46;}
  .bar{display:flex;gap:10px;align-items:center;padding:8px 12px;font-size:.8rem;color:var(--sub);flex-wrap:wrap;}
  .bar label{display:flex;align-items:center;gap:4px;}
  .bar .shuffle{border:1px solid #334155;background:var(--card);color:var(--txt);border-radius:8px;padding:6px 10px;font-size:.78rem;}
  #list{padding:0 12px 100px;}
  .card{background:var(--card);border-radius:12px;padding:12px 14px;margin:10px 0;border-left:4px solid var(--acc);}
  .card.saidok{border-left-color:var(--ok);}
  .en{font-size:1.02rem;font-weight:bold;line-height:1.4;}
  .kana{color:var(--acc2);font-size:.85rem;margin-top:4px;line-height:1.4;}
  .ja{color:var(--sub);font-size:.85rem;margin-top:4px;}
  .tip{color:#7dd3fc;font-size:.75rem;margin-top:4px;}
  .btns{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}
  .btns button{border:none;border-radius:8px;padding:8px 12px;font-size:.82rem;background:#334155;color:var(--txt);}
  .btns .play{background:var(--acc);color:#03202f;font-weight:bold;}
  .btns .said{background:#14532d;color:#bbf7d0;}
  .card.saidok .said{background:var(--ok);color:#04270f;font-weight:bold;}
  .hidden-en .en,.hidden-en .kana{filter:blur(6px);}
  .card.revealed .en,.card.revealed .kana{filter:none;}
  .quizhint{display:none;font-size:.75rem;color:var(--ok);margin-top:6px;}
  .hidden-en .quizhint{display:block;}
  .card.revealed .quizhint{display:none;}
  footer{position:fixed;bottom:0;left:0;right:0;background:#0b1220;padding:10px;display:flex;gap:8px;justify-content:center;border-top:1px solid #1e293b;}
  footer button{border:none;border-radius:10px;padding:10px 14px;font-size:.82rem;background:#334155;color:var(--txt);}
  footer .main{background:var(--ok);color:#04270f;font-weight:bold;}
  .notice{font-size:.7rem;color:var(--sub);text-align:center;padding:6px 16px 10px;}
</style>
</head>
<body>
<header>
  <h1>🚁 ドローン講師 英語フレーズ練習 v2</h1>
  <p>聞く → 真似る → 「✓言えた」で進捗記録</p>
  <div class="progressAll" id="progAll"></div>
</header>

<div class="tabs" id="tabs"></div>

<div class="bar">
  <label><input type="checkbox" id="showKana" checked> カタカナ</label>
  <label>速さ
    <select id="rate">
      <option value="1">ふつう</option>
      <option value="0.7" selected>ゆっくり</option>
      <option value="0.5">とてもゆっくり</option>
    </select>
  </label>
  <button class="shuffle" id="shufBtn">🔀 シャッフル</button>
</div>

<div id="list"></div>

<footer>
  <button class="main" id="playAll">▶ 全部再生</button>
  <button id="quizBtn">🎯 クイズ</button>
  <button id="unsaidBtn">🔥 未達のみ</button>
  <button id="stopBtn">⏹ 停止</button>
</footer>
<div class="notice" id="voiceNote"></div>

let quizMode = false, unsaidOnly = false, shuffled = false;
let voice = null;
const said = JSON.parse(localStorage.getItem('engPhraseSaid')||'{}');
function keyOf(item){ return item.en; }
function saveSaid(){ localStorage.setItem('engPhraseSaid', JSON.stringify(said)); }

function pickVoice(){
  const vs = speechSynthesis.getVoices().filter(v=>v.lang.startsWith('en'));
  voice = vs.find(v=>/US|United States/i.test(v.name+v.lang)) || vs[0] || null;
  $('voiceNote').textContent = voice ? '音声: '+voice.name : '⚠ 英語音声が見つかりません。Chrome/Edge/Safariで開いてください。';
}
speechSynthesis.onvoiceschanged = pickVoice;
pickVoice();

function speak(text, rate){
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang='en-US'; if(voice) u.voice=voice;
  u.rate = rate ?? parseFloat($('rate').value);
  speechSynthesis.speak(u);
}

function progressOf(cat){
  const items = DATA[cat];
  const n = items.filter(i=>said[keyOf(i)]).length;
  return [n, items.length];
}
function renderProgressAll(){
  let n=0,t=0;
  Object.keys(DATA).forEach(c=>{const [a,b]=progressOf(c); n+=a; t+=b;});
  $('progAll').textContent = `✓言えた: ${n} / ${t} フレーズ`;
}

function renderTabs(){
  const t = $('tabs'); t.innerHTML='';
  Object.keys(DATA).forEach(cat=>{
    const [a,b] = progressOf(cat);
    const btn = document.createElement('button');
    btn.innerHTML = cat + ' <span class="done">'+(a===b?'✓':a+'/'+b)+'</span>';
    btn.className = cat===currentCat?'active':'';
    btn.onclick = ()=>{ currentCat=cat; shuffled=false; renderTabs(); renderList(); };
    t.appendChild(btn);
  });
}

function renderList(){
  const list = $('list');
  const showKana = $('showKana').checked;
  list.innerHTML='';
  let items = [...DATA[currentCat]];
  if(unsaidOnly) items = items.filter(i=>!said[keyOf(i)]);
  if(shuffled) items.sort(()=>Math.random()-0.5);
  if(items.length===0){
    list.innerHTML = '<p style="text-align:center;color:var(--ok);padding:30px 0;">🎉 このカテゴリは全部「言えた」達成!</p>';
    return;
  }
  items.forEach(item=>{
    const c = document.createElement('div');
    c.className = 'card' + (said[keyOf(item)] ? ' saidok' : '');
    if(quizMode) c.classList.add('hidden-en');
    c.innerHTML =
      '<div class="en">'+item.en+'</div>' +
      (showKana?'<div class="kana">🔊 '+item.kana+'</div>':'') +
      '<div class="ja">🇯🇵 '+item.ja+'</div>' +
      (item.tip?'<div class="tip">💡 '+item.tip+'</div>':'') +
      '<div class="quizhint">▼ 英語で言ってみて、カードをタップで答え合わせ</div>' +
      '<div class="btns">' +
        '<button class="play">▶ 再生</button>' +
        '<button class="slow">🐢 ゆっくり</button>' +
        '<button class="said">✓ 言えた</button>' +
      '</div>';
    const playB=c.querySelector('.play'), slowB=c.querySelector('.slow'),
          saidB=c.querySelector('.said');
    playB.onclick=e=>{e.stopPropagation(); c.classList.add('revealed'); speak(item.en,1);};
    slowB.onclick=e=>{e.stopPropagation(); c.classList.add('revealed'); speak(item.en,0.55);};
    saidB.onclick=e=>{
      e.stopPropagation();
      said[keyOf(item)] = !said[keyOf(item)];
      if(!said[keyOf(item)]) delete said[keyOf(item)];
      saveSaid(); c.classList.toggle('saidok');
      renderTabs(); renderProgressAll();
    };
    c.onclick=()=>{ if(quizMode && !c.classList.contains('revealed')){ c.classList.add('revealed'); speak(item.en,1);} };
    list.appendChild(c);
  });
  window.scrollTo(0,0);
}

$('showKana').onchange = renderList;
$('shufBtn').onclick = ()=>{ shuffled=true; renderList(); };
$('playAll').onclick = ()=>{
  speechSynthesis.cancel();
  const rate = parseFloat($('rate').value);
  let items = [...DATA[currentCat]];
  if(unsaidOnly) items = items.filter(i=>!said[keyOf(i)]);
  items.forEach(item=>{
    const u=new SpeechSynthesisUtterance(item.en);
    u.lang='en-US'; if(voice)u.voice=voice; u.rate=rate;
    speechSynthesis.speak(u);
  });
};
$('quizBtn').onclick = ()=>{
  quizMode=!quizMode;
  $('quizBtn').textContent = quizMode?'📖 通常':'🎯 クイズ';
  renderList();
};
$('unsaidBtn').onclick = ()=>{
  unsaidOnly=!unsaidOnly;
  $('unsaidBtn').textContent = unsaidOnly?'📚 全部表示':'🔥 未達のみ';
  renderList();
};
$('stopBtn').onclick = ()=>speechSynthesis.cancel();

renderTabs();
renderList();
renderProgressAll();
</script>

 background:rgba(15,23,42,.75);color:#fff;text-decoration:none;font-size:1.1rem;
 width:40px;height:40px;border-radius:50%;display:flex;align-items:center;
 justify-content:center;border:1px solid rgba(255,255,255,.3);">🏠</a>
