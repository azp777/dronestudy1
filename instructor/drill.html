<style>
  :root{--bg:#0f172a;--card:#1e293b;--acc:#38bdf8;--warn:#f59e0b;--ok:#22c55e;--ng:#ef4444;--txt:#f1f5f9;--sub:#94a3b8;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;font-family:"Hiragino Sans","Yu Gothic",system-ui,sans-serif;background:var(--bg);color:var(--txt);}
  header{padding:16px;text-align:center;background:linear-gradient(135deg,#7c3aed,#1d4ed8);}
  header h1{margin:0;font-size:1.1rem;}
  header p{margin:4px 0 0;font-size:.72rem;opacity:.85;}
  .tabs{display:flex;gap:6px;padding:10px;background:#0b1220;position:sticky;top:0;z-index:5;}
  .tabs button{flex:1;border:1px solid #334155;background:var(--card);color:var(--txt);padding:10px 4px;border-radius:12px;font-size:.78rem;}
  .tabs button.active{background:var(--acc);color:#03202f;border-color:var(--acc);font-weight:bold;}
  main{padding:12px;max-width:640px;margin:0 auto;padding-bottom:40px;}
  .stat{font-size:.8rem;color:var(--sub);margin:4px 0 12px;text-align:center;}
  .q{background:var(--card);border-radius:14px;padding:16px;margin-bottom:12px;}
  .q .lead{font-size:.75rem;color:var(--sub);margin-bottom:8px;}
  .q .scenario{font-size:1rem;line-height:1.6;font-weight:bold;}
  .choices{display:grid;gap:8px;margin-top:14px;}
  .choices button{border:1px solid #334155;background:#0b1220;color:var(--txt);padding:12px;border-radius:10px;font-size:.92rem;text-align:left;}
  .choices button.correct{background:#14532d;border-color:var(--ok);}
  .choices button.wrong{background:#450a0a;border-color:var(--ng);}
  .expl{display:none;margin-top:12px;padding:10px;border-radius:10px;background:#0b1220;font-size:.85rem;line-height:1.6;color:var(--sub);}
  .expl.show{display:block;}
  .expl b{color:var(--warn);}
  .next{width:100%;margin-top:12px;border:none;border-radius:12px;padding:14px;font-size:1rem;font-weight:bold;background:var(--acc);color:#03202f;display:none;}
  .next.show{display:block;}
  /* 60秒チャレンジ */
  .topic{background:var(--card);border-radius:14px;padding:20px;text-align:center;}
  .topic .t{font-size:1.05rem;font-weight:bold;line-height:1.6;min-height:3em;}
  .timer{font-size:3rem;font-weight:bold;margin:12px 0;color:var(--acc);}
  .timer.warn{color:var(--ng);}
  .row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:8px;}
  .row button{border:none;border-radius:12px;padding:12px 18px;font-size:.9rem;font-weight:bold;}
  .b-start{background:var(--ok);color:#04270f;}
  .b-next{background:#334155;color:var(--txt);}
  .b-hint{background:var(--warn);color:#3b2503;}
  .hint{display:none;margin-top:14px;font-size:.85rem;color:var(--sub);text-align:left;line-height:1.7;background:#0b1220;border-radius:10px;padding:12px;}
  .hint.show{display:block;}
  .selfrate{display:none;margin-top:12px;}
  .selfrate.show{display:block;}
  .selfrate button{margin:4px;}
  .b-good{background:var(--ok);color:#04270f;}
  .b-bad{background:var(--ng);color:#fff;}
  .note{font-size:.72rem;color:var(--sub);text-align:center;margin-top:16px;line-height:1.6;}
</style>
</head>

 {q:"一等の目視外(目視内飛行の限定変更)スクエア飛行の位置安定機能として正しいものを選びなさい。", c:["OFF","ON","受験者が選択"], a:1, e:"目視外スクエアはON(カメラのみで操縦)。異常事態科目はOFF。"},
 {q:"二等の目視外・異常事態科目の着陸方法として正しいものを選びなさい。", c:["目視外のまま緊急着陸する","目視内に戻って着陸する","自動RTHで着陸する"], a:1, e:"二等は「機体を目視できる状態に戻り目視内で着陸」。一等は目視外のまま緊急着陸地点へ。ここが一等/二等の差。"},
 {q:"修了審査で使う机上・口述(事故等)の問題の扱いとして正しいものを選びなさい。", c:["講習機関が自作する","国または指定試験機関から提供されたものを使う","教則から講師が選ぶ"], a:1, e:"細則VII章(準用)。勝手に作れない。"}
];

/* ========== モード3:60秒説明チャレンジ ========== */
const TOPICS = [
 {t:"カテゴリーI/II/IIIの違いを、ドローン未経験者に説明してください", h:"鍵は「特定飛行かどうか」×「立入管理措置の有無」。III=措置なしで第三者上空=一等+第一種機体認証が必要。"},
 {t:"なぜ一等の基本は位置安定機能OFFで試験するのか、制度の意図から説明してください", h:"カテゴリーIII=第三者上空。GNSS喪失など機能低下時でも安全に飛ばせる「素の操縦力」が人の命を守る最後の砦だから。"},
 {t:"「立入管理措置」とは何か、具体例を3つ挙げて説明してください", h:"第三者の立入りを制限する措置。例:立入禁止の看板+監視員、ロープ・フェンス区画、補助者による周知。"},
 {t:"減点区画と不合格区画の違いと、2秒復帰ルールを説明してください", h:"減点区画(yellow)=半分以上進入で5点減点(初回は2秒以内復帰で免除)。不合格区画(red)=半分以上進入で即中止。"},
 {t:"ピルエットホバリングの合格基準と練習のコツを説明してください", h:"20秒程度で一回転(16〜26秒)。90°を約5秒のリズム。位置安定OFFなので当て舵を続けながら回す。"},
 {t:"事故と重大インシデントの違いを、それぞれ3つ挙げて説明してください", h:"事故:人の死傷/物件損壊/航空機との衝突・接触。重大インシデント:航空機と衝突のおそれ/人の負傷/制御不能/発火等。発生時は飛行中止・救護・国交省へ報告。"},
 {t:"飛行日誌はなぜ法定義務なのか、何を書くのか説明してください", h:"特定飛行で義務。飛行記録・日常点検記録・整備記録の3点。口述試験でも飛行時間計算まで問われる(誤りは10点減点)。"},
 {t:"レベル3.5飛行とは何か説明してください(教則第4版の新論点)", h:"無人地帯の目視外(レベル3)で、技能証明+保険加入+カメラによる歩行者等の確認を条件に、立入管理措置(補助者・看板)を省略できる仕組み。"},
 {t:"RTH(フェールセーフ)の設定を誤ると何が起きるか、実例で説明してください", h:"帰還高度が障害物より低い→衝突。離陸点更新忘れ→あらぬ場所へ帰還。電波喪失時の挙動(ホバリング/着陸/RTH)の違いを機体ごとに確認。"},
 {t:"風速5m/sで試験・講習はどうなるか、運営側の手順で説明してください", h:"各科目開始前に風速計で計測(細則I-7)。5m/s以上の突風・降雨は中止→受験者に起因しないので再試験可(基準3-8-3)。"},
 {t:"「安全確認は声に出せ」と受講生に指導する理由を説明してください", h:"注6:試験員に伝えなければ確認していないとみなされ5点減点。現場でもCRM(チーム運航)の基本動作。"},
 {t:"一等と二等の実地試験の違いを1分でプレゼンしてください", h:"想定(措置なし/あり)、合格ライン(80/70)、位置安定(OFF/ON)、科目(高度変化+ピルエット+緊急8の字 vs スクエア+8の字+異常事態)、机上(5問10分/4問5分)。"},
 {t:"2026年6月5日施行の改正点を受講生向けに説明してください", h:"口述・机上に制限時間(時間切れ=漏れ・未回答扱い)/2秒復帰ルール/ピルエット16〜26秒/保護具着用義務/係留禁止。「点検を体系立てて実行できるか」を問う方向へ。"},
 {t:"目視外飛行(目視内飛行の限定変更)の試験の流れと注意点を説明してください", h:"受験者は機体に背を向ける。カメラ画像のみで飛行。指示なく機体を見たら不正行為=不合格。一等は目視外のまま緊急着陸、二等は目視内に戻って着陸。"},
 {t:"日常点検で見るポイントを、機体を目の前にしているつもりで順に説明してください", h:"取付(ネジ・コネクタ)→外観(プロペラ・フレーム・識別票)→電源→通信/GNSS→バッテリー→リモートID→モーター→ホバリングで操縦系統。"},
 {t:"なぜ8の字・円周飛行で「円の中心を含まない周回」が不合格なのか説明してください", h:"経路を大きくショートカット=コースを飛べていない=制御できていない扱い。「墜落・損傷・制御不能」の細目に含まれている。"},
 {t:"DID(人口集中地区)で飛ばしたい受講生に、必要な手続きを説明してください", h:"登録+リモートID→DIDは特定飛行→許可申請(DIPS2.0)。二等+第二種機体認証があればカテゴリーIIの一部手続きが簡略化。"},
 {t:"バッテリー(リポ)の取扱注意を現場目線で説明してください", h:"膨らみ・損傷は使用禁止/満充電保管NG(50〜60%)/低温で性能低下/専用バッグ保管/廃棄は放電+自治体ルール。"}
];

/* ========== 共通処理 ========== */
const $ = id => document.getElementById(id);
let mode = 0;
let order = [], idx = 0;
const store = JSON.parse(localStorage.getItem('instrDrill')||'{"d":[0,0],"n":[0,0],"t":0}');
function save(){ localStorage.setItem('instrDrill', JSON.stringify(store)); }
function shuffle(n){ const a=[...Array(n).keys()]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

function setMode(m){
  mode = m;
  [0,1,2].forEach(i=>$('tab'+i).classList.toggle('active', i===m));
  idx = 0;
  if(m===0){ order = shuffle(DEDUCT.length); showQuiz(DEDUCT, 'd', '受験者の行為', 'あなたは試験員(修了審査員)です。裁定として正しいものを選びなさい。'); }
  else if(m===1){ order = shuffle(NUM.length); showQuiz(NUM, 'n', '', ''); }
  else { order = shuffle(TOPICS.length); showTopic(); }
}
$('tab0').onclick=()=>setMode(0);
$('tab1').onclick=()=>setMode(1);
$('tab2').onclick=()=>setMode(2);

function statTxt(){
  if(mode===0) return `⚖️ 減点判定:通算 ${store.d[0]}問中 ${store.d[1]}問正解` + rate(store.d);
  if(mode===1) return `🔢 数値・規定:通算 ${store.n[0]}問中 ${store.n[1]}問正解` + rate(store.n);
  return `⏱ 説明チャレンジ:通算 ${store.t}本完走`;
}
function rate(x){ return x[0] ? `(${Math.round(x[1]/x[0]*100)}%)` : ''; }

function showQuiz(data, key, leadLabel, prompt){
  const item = data[order[idx % order.length]];
  const text = item.s || item.q;
  $('stat').textContent = statTxt();
  $('area').innerHTML = `
    <div class="q">
      ${leadLabel ? `<div class="lead">【${leadLabel}】</div>` : ''}
      <div class="scenario">${text}</div>
      ${prompt ? `<div class="lead" style="margin-top:8px;">${prompt}</div>` : ''}
      <div class="choices" id="ch"></div>
      <div class="expl" id="ex">${item.e}</div>
      <button class="next" id="nx">次の問題 ▶</button>
    </div>`;
  item.c.forEach((lb,i)=>{
    const b=document.createElement('button'); b.textContent=lb;
    b.onclick=()=>{
      store[key][0]++; if(i===item.a){b.classList.add('correct');store[key][1]++;}
      else{b.classList.add('wrong'); [...$('ch').children][item.a].classList.add('correct');}
      save(); $('ex').classList.add('show'); $('nx').classList.add('show');
      [...$('ch').children].forEach(x=>x.disabled=true);
      $('stat').textContent = statTxt();
    };
    $('ch').appendChild(b);
  });
  $('nx').onclick=()=>{ idx++; showQuiz(data, key, leadLabel, prompt); };
}

let timerId=null;
function showTopic(){
  clearInterval(timerId);
  const item = TOPICS[order[idx % order.length]];
  $('stat').textContent = statTxt();
  $('area').innerHTML = `
    <div class="topic">
      <div style="font-size:.75rem;color:var(--sub);margin-bottom:8px;">お題(声に出して60秒で説明。録音アプリ併用推奨)</div>
      <div class="t">${item.t}</div>
      <div class="timer" id="tm">60</div>
      <div class="row">
        <button class="b-start" id="st">▶ スタート</button>
        <button class="b-hint" id="hi">💡 模範ポイント</button>
        <button class="b-next" id="nx2">⏭ 別のお題</button>
      </div>
      <div class="hint" id="hint">${item.h}</div>
      <div class="selfrate" id="sr">
        <div style="font-size:.85rem;color:var(--sub);">自己採点:詰まらずに説明できましたか?</div>
        <div class="row">
          <button class="b-good" id="good">😊 できた!</button>
          <button class="b-bad" id="bad">😅 もう一回</button>
        </div>
      </div>
    </div>`;
  $('st').onclick=()=>{
    let t=60; $('tm').textContent=t; $('tm').classList.remove('warn');
    clearInterval(timerId);
    timerId=setInterval(()=>{
      t--; $('tm').textContent=t;
      if(t<=10)$('tm').classList.add('warn');
      if(t<=0){ clearInterval(timerId); $('tm').textContent='終了!'; $('sr').classList.add('show'); }
    },1000);
  };
  $('hi').onclick=()=>$('hint').classList.toggle('show');
  $('nx2').onclick=()=>{ clearInterval(timerId); idx++; showTopic(); };
  $('good').onclick=()=>{ store.t++; save(); idx++; showTopic(); };
  $('bad').onclick=()=>{ $('sr').classList.remove('show'); $('tm').textContent='60'; };
}

setMode(0);
</script>
