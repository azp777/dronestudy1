<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>実地試験シミュレーター(一等・二等マルチローター)</title>
<style>
  :root{--bg:#0f172a;--card:#1e293b;--acc:#38bdf8;--warn:#f59e0b;--ok:#22c55e;--ng:#ef4444;--txt:#f1f5f9;--sub:#94a3b8;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;font-family:"Hiragino Sans","Yu Gothic",system-ui,sans-serif;background:var(--bg);color:var(--txt);}
  header{padding:16px;text-align:center;background:linear-gradient(135deg,#0891b2,#1d4ed8);}
  header h1{margin:0;font-size:1.08rem;}
  header p{margin:4px 0 0;font-size:.72rem;opacity:.85;}
  .tabs{display:flex;gap:5px;padding:10px 8px;background:#0b1220;position:sticky;top:0;z-index:5;}
  .tabs button{flex:1;border:1px solid #334155;background:var(--card);color:var(--txt);padding:10px 2px;border-radius:12px;font-size:.72rem;}
  .tabs button.active{background:var(--acc);color:#03202f;border-color:var(--acc);font-weight:bold;}
  main{padding:12px;max-width:640px;margin:0 auto;padding-bottom:40px;}
  .stat{font-size:.8rem;color:var(--sub);margin:4px 0 12px;text-align:center;}
  .q{background:var(--card);border-radius:14px;padding:16px;margin-bottom:12px;}
  .q .lead{font-size:.75rem;color:var(--sub);margin-bottom:8px;}
  .q .scenario{font-size:1rem;line-height:1.6;font-weight:bold;}
  .choices{display:grid;gap:8px;margin-top:14px;}
  .choices button{border:1px solid #334155;background:#0b1220;color:var(--txt);padding:12px;border-radius:10px;font-size:.92rem;text-align:left;}
  .choices button.correct{background:#14532d;border-color:var(--ok);}
  .choices button.wrong{background:#450a0a;border-color:var(--ng);}
  .expl{display:none;margin-top:12px;padding:10px;border-radius:10px;background:#0b1220;font-size:.85rem;line-height:1.6;color:var(--sub);}
  .expl.show{display:block;}
  .expl b{color:var(--warn);}
  .next{width:100%;margin-top:12px;border:none;border-radius:12px;padding:14px;font-size:1rem;font-weight:bold;background:var(--acc);color:#03202f;display:none;}
  .next.show{display:block;}
  /* 科目ガイド */
  .clsSel{display:flex;gap:8px;margin-bottom:14px;}
  .clsSel button{flex:1;border:1px solid #334155;background:var(--card);color:var(--txt);padding:12px;border-radius:12px;font-size:.95rem;font-weight:bold;}
  .clsSel button.on1{background:#1d4ed8;border-color:#60a5fa;}
  .clsSel button.on2{background:#15803d;border-color:#4ade80;}
  .intro{background:#0b1220;border:1px solid #334155;border-radius:12px;padding:12px 14px;font-size:.83rem;line-height:1.7;color:var(--sub);margin-bottom:12px;}
  .subj{background:var(--card);border-radius:12px;padding:13px 15px;margin-bottom:10px;border-left:4px solid var(--acc);}
  .subj h3{margin:0 0 5px;font-size:.95rem;}
  .subj .time{float:right;font-size:.72rem;color:#03202f;background:var(--warn);border-radius:8px;padding:2px 8px;font-weight:bold;}
  .subj p{margin:0;font-size:.82rem;color:var(--sub);line-height:1.65;}
  h2.sec{font-size:.85rem;color:var(--sub);font-weight:normal;border-left:4px solid var(--warn);padding-left:8px;margin:20px 4px 10px;}
  /* 口述フラッシュカード */
  .flash{background:var(--card);border-radius:14px;padding:20px;text-align:center;min-height:230px;display:flex;flex-direction:column;justify-content:center;}
  .flash .fq{font-size:1.05rem;font-weight:bold;line-height:1.6;}
  .flash .fa{display:none;margin-top:14px;font-size:.95rem;line-height:1.8;color:#86efac;text-align:left;background:#0b1220;border-radius:10px;padding:12px;}
  .flash .memo{display:none;margin-top:8px;font-size:.78rem;color:var(--sub);text-align:left;line-height:1.6;}
  .flash.open .fa,.flash.open .memo{display:block;}
  .flash .tap{margin-top:14px;font-size:.75rem;color:var(--sub);}
  .flash.open .tap{display:none;}
  .row{display:flex;gap:8px;justify-content:center;margin-top:12px;}
  .row button{border:none;border-radius:12px;padding:12px 20px;font-size:.9rem;font-weight:bold;background:#334155;color:var(--txt);}
  .row .main{background:var(--acc);color:#03202f;}
  .note{font-size:.72rem;color:var(--sub);text-align:center;margin-top:16px;line-height:1.6;}
</style>
</head>
<body>
<header>
  <h1>🛩 実地試験シミュレーター</h1>
  <p>一等・二等マルチローター|2026年6月5日施行の新基準対応|全問三肢択一</p>
</header>

<div class="tabs">
  <button id="tab0" class="active">📋 科目ガイド</button>
  <button id="tab1">⚖️ 減点クイズ</button>
  <button id="tab2">🔢 数値ドリル</button>
  <button id="tab3">🗣 口述対策</button>
</div>

<main>
  <div class="stat" id="stat"></div>
  <div id="area"></div>
  <div class="note">出典:国土交通省 実地試験実施基準+一等/二等実地試験実施細則(マルチローター)<br>令和7年12月5日改正・令和8年6月5日施行版|成績はこの端末に保存されます</div>
</main>

<script>

/* ========== 共通処理 ========== */
const $ = id => document.getElementById(id);
let mode = 0, cls = '一等';
let order = [], idx = 0;
const store = JSON.parse(localStorage.getItem('jitsugiSim')||'{"d":[0,0],"n":[0,0]}');
function save(){ localStorage.setItem('jitsugiSim', JSON.stringify(store)); }
function shuffle(n){ const a=[...Array(n).keys()]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

function setMode(m){
  mode = m;
  [0,1,2,3].forEach(i=>$('tab'+i).classList.toggle('active', i===m));
  idx = 0;
  if(m===0) showGuide();
  else if(m===1){ order = shuffle(DEDUCT.length); showQuiz(DEDUCT,'d','試験中の場面','この場合の結果として正しいものを選びなさい。'); }
  else if(m===2){ order = shuffle(NUM.length); showQuiz(NUM,'n','',''); }
  else { order = shuffle(ORAL.length); showFlash(); }
}
[0,1,2,3].forEach(i=>$('tab'+i).onclick=()=>setMode(i));

function statTxt(){
  if(mode===1) return `⚖️ 減点クイズ:通算 ${store.d[0]}問中 ${store.d[1]}問正解` + rate(store.d);
  if(mode===2) return `🔢 数値ドリル:通算 ${store.n[0]}問中 ${store.n[1]}問正解` + rate(store.n);
  return '';
}
function rate(x){ return x[0] ? `(${Math.round(x[1]/x[0]*100)}%)` : ''; }

function showGuide(){
  $('stat').textContent='';
  const g = GUIDE[cls];
  let h = `<div class="clsSel">
    <button id="c1" class="${cls==='一等'?'on1':''}">🥇 一等</button>
    <button id="c2" class="${cls==='二等'?'on2':''}">🥈 二等</button>
  </div>
  <div class="intro">${g.intro}</div>
  <h2 class="sec">基本の試験の流れ</h2>`;
  g.subjects.forEach(s=>{ h += `<div class="subj"><span class="time">${s.t}</span><h3>${s.n}</h3><p>${s.d}</p></div>`; });
  h += `<h2 class="sec">限定変更(追加で取れる資格)</h2>`;
  g.gentei.forEach(s=>{ h += `<div class="subj" style="border-left-color:#a78bfa"><h3>${s.n}</h3><p>${s.d}</p></div>`; });
  $('area').innerHTML = h;
  $('c1').onclick=()=>{cls='一等';showGuide();};
  $('c2').onclick=()=>{cls='二等';showGuide();};
  window.scrollTo(0,0);
}

function showQuiz(data, key, leadLabel, prompt){
  const item = data[order[idx % order.length]];
  const text = item.s || item.q;
  $('stat').textContent = statTxt();
  $('area').innerHTML = `
    <div class="q">
      ${leadLabel ? `<div class="lead">【${leadLabel}】</div>` : ''}
      <div class="scenario">${text}</div>
      ${prompt ? `<div class="lead" style="margin-top:8px;">${prompt}</div>` : ''}
      <div class="choices" id="ch"></div>
      <div class="expl" id="ex">${item.e}</div>
      <button class="next" id="nx">次の問題 ▶</button>
    </div>`;
  item.c.forEach((lb,i)=>{
    const b=document.createElement('button'); b.textContent=lb;
    b.onclick=()=>{
      store[key][0]++; if(i===item.a){b.classList.add('correct');store[key][1]++;}
      else{b.classList.add('wrong'); [...$('ch').children][item.a].classList.add('correct');}
      save(); $('ex').classList.add('show'); $('nx').classList.add('show');
      [...$('ch').children].forEach(x=>x.disabled=true);
      $('stat').textContent = statTxt();
    };
    $('ch').appendChild(b);
  });
  $('nx').onclick=()=>{ idx++; showQuiz(data, key, leadLabel, prompt); };
}

function showFlash(){
  const item = ORAL[order[idx % order.length]];
  $('stat').textContent = `🗣 口述対策カード ${ (idx % ORAL.length) + 1 } / ${ORAL.length}`;
  $('area').innerHTML = `
    <div class="flash" id="fc">
      <div class="fq">${item.q}</div>
      <div class="tap">▼ タップして答えを表示</div>
      <div class="fa">${item.a}</div>
      <div class="memo">💡 ${item.m}</div>
    </div>
    <div class="row">
      <button class="main" id="nf">次のカード ▶</button>
    </div>`;
  $('fc').onclick=()=>$('fc').classList.add('open');
  $('nf').onclick=()=>{ idx++; showFlash(); };
}

setMode(0);
</script>
