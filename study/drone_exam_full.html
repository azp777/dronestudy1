<!DOCTYPE html>

<head>

<title>一等無人航空機 学科試験対策 完全版</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Meiryo','Yu Gothic',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
header{background:linear-gradient(135deg,#1e3a5f,#0f172a);padding:18px 24px;border-bottom:2px solid #2563eb;display:flex;align-items:center;justify-content:space-between}
header h1{font-size:1.2rem;font-weight:700;color:#60a5fa}
header .sub{font-size:.75rem;color:#475569;margin-top:2px}
.badge{background:#2563eb;color:#fff;border-radius:20px;padding:3px 12px;font-size:.75rem}
.main{max-width:860px;margin:0 auto;padding:22px 16px}
.tabs{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap}
.tab{padding:8px 16px;border-radius:8px;border:1.5px solid #334155;background:transparent;color:#64748b;cursor:pointer;font-size:.83rem;transition:all .15s}
.tab.active{background:#2563eb;border-color:#2563eb;color:#fff}
.tab:hover:not(.active){border-color:#475569;color:#cbd5e1}
.screen{display:none}.screen.active{display:block}

/* HOME */
.section-title{font-size:.8rem;color:#64748b;text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px}
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.cat-card{background:#1e293b;border:1.5px solid #334155;border-radius:12px;padding:18px 16px;cursor:pointer;transition:all .2s}
.cat-card:hover{border-color:#2563eb;transform:translateY(-2px);box-shadow:0 4px 20px #2563eb33}
.cat-card .icon{font-size:1.8rem;margin-bottom:8px}
.cat-card h3{font-size:.88rem;color:#93c5fd;margin-bottom:4px}
.cat-card p{font-size:.75rem;color:#64748b;line-height:1.5}
.cat-card .q-count{font-size:.7rem;color:#2563eb;margin-top:6px;font-weight:600}
.stat-bar{display:flex;gap:16px;background:#1e293b;border-radius:10px;padding:14px 18px;margin-bottom:20px;border:1px solid #334155}
.stat-item{text-align:center}.stat-item .val{font-size:1.5rem;font-weight:700;color:#60a5fa}
.stat-item .lbl{font-size:.72rem;color:#64748b}

/* QUIZ */
.q-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.q-progress-bar{background:#1e293b;border-radius:99px;height:7px;flex:1;margin:0 12px}
.q-progress-fill{background:#2563eb;height:100%;border-radius:99px;transition:width .4s}
.q-count{font-size:.8rem;color:#94a3b8;white-space:nowrap}
.q-card{background:#1e293b;border-radius:12px;padding:22px 20px;margin-bottom:16px;border:1px solid #334155}
.q-tag{font-size:.7rem;background:#1d4ed833;color:#60a5fa;border:1px solid #2563eb55;border-radius:20px;padding:2px 10px;display:inline-block;margin-bottom:10px}
.q-num{font-size:.72rem;color:#475569;margin-bottom:6px}
.q-text{font-size:.96rem;line-height:1.8;color:#e2e8f0}
.q-given{background:#0f172a;border-left:3px solid #2563eb;border-radius:0 8px 8px 0;padding:10px 14px;margin:12px 0;font-size:.85rem;color:#94a3b8;line-height:1.8;white-space:pre-line}
.choices{display:flex;flex-direction:column;gap:9px}
.choice-btn{background:#0f172a;border:1.5px solid #334155;border-radius:9px;padding:12px 16px;text-align:left;cursor:pointer;color:#cbd5e1;font-size:.9rem;transition:all .15s;width:100%}
.choice-btn:hover:not(:disabled){border-color:#3b82f6;background:#1e293b}
.choice-btn.correct{border-color:#22c55e;background:#14532d33;color:#86efac}
.choice-btn.wrong{border-color:#ef4444;background:#7f1d1d33;color:#fca5a5}
.choice-btn.reveal{border-color:#22c55e;background:#14532d22;color:#86efac}
.choice-btn:disabled{cursor:default;opacity:.85}
.choice-label{color:#475569;margin-right:8px;font-size:.82rem}

/* EXPLANATION */
.explanation{background:#0c1a2e;border:1px solid #1d4ed8;border-radius:12px;padding:18px 20px;margin-top:14px;display:none}
.explanation.show{display:block}
.explanation h4{color:#60a5fa;margin-bottom:12px;font-size:.92rem}
.step{display:flex;gap:10px;margin-bottom:12px;align-items:flex-start}
.step-num{background:#2563eb;color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:.7rem;flex-shrink:0;margin-top:2px}
.step-body{font-size:.86rem;line-height:1.75;color:#cbd5e1}
.step-body strong{color:#93c5fd}
.calc{background:#1e3a5f55;border-radius:5px;padding:5px 10px;margin-top:4px;font-family:monospace;font-size:.88rem;color:#7dd3fc;display:block}
.formula-box{background:#1e293b;border:1px dashed #2563eb;border-radius:7px;padding:10px 14px;margin:8px 0;text-align:center;font-size:1rem;color:#fbbf24}
.answer-highlight{background:#064e3b;border:1.5px solid #22c55e;border-radius:7px;padding:9px 14px;margin-top:8px;text-align:center;color:#86efac;font-size:.95rem;font-weight:700}

/* HINT */
.hint-panel{background:#1c1a0e;border:1px solid #92400e;border-radius:9px;padding:12px 16px;margin-top:10px;display:none}
.hint-panel.show{display:block}
.hint-panel p{font-size:.84rem;color:#fde68a;line-height:1.7;white-space:pre-line}

/* BUTTONS */
.nav-btns{display:flex;gap:9px;justify-content:flex-end;margin-top:14px;flex-wrap:wrap}
.btn{padding:9px 20px;border-radius:8px;border:none;cursor:pointer;font-size:.88rem;font-weight:600;transition:all .15s}
.btn-primary{background:#2563eb;color:#fff}.btn-primary:hover{background:#1d4ed8}
.btn-secondary{background:#334155;color:#cbd5e1}.btn-secondary:hover{background:#475569}
.btn-hint{background:#92400e44;color:#fbbf24;border:1px solid #92400e}.btn-hint:hover{background:#92400e66}

/* RESULT */
.result-card{background:#1e293b;border-radius:16px;padding:32px 24px;text-align:center;border:1px solid #334155}
.result-score{font-size:3.5rem;font-weight:800;color:#60a5fa;line-height:1}
.result-label{font-size:.95rem;color:#94a3b8;margin:8px 0 18px}
.result-breakdown{display:flex;justify-content:center;gap:28px;margin-bottom:24px}
.result-breakdown div{text-align:center}
.result-breakdown .val{font-size:1.7rem;font-weight:700}
.result-breakdown .lbl{font-size:.76rem;color:#64748b}
.green{color:#22c55e}.red{color:#ef4444}
.result-cats{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:20px}
.result-cat-tag{background:#1e293b;border:1px solid #334155;border-radius:20px;padding:4px 12px;font-size:.76rem;color:#94a3b8}
.result-msg{font-size:1rem;margin-bottom:22px;color:#93c5fd}

/* FORMULA PAGE */
.formula-list{display:grid;gap:12px}
.formula-item{background:#1e293b;border-radius:10px;padding:16px 18px;border:1px solid #334155}
.formula-item h4{color:#60a5fa;margin-bottom:10px;font-size:.9rem}
.f-box{background:#0f172a;border-radius:6px;padding:9px 13px;font-family:monospace;color:#fbbf24;font-size:.95rem;margin-bottom:7px}
.formula-item p{font-size:.8rem;color:#64748b;line-height:1.65}
.formula-item .example{background:#0c1a2e;border-radius:6px;padding:8px 12px;font-size:.8rem;color:#7dd3fc;margin-top:8px;line-height:1.7}

/* WRONG REVIEW */
.review-list{display:flex;flex-direction:column;gap:12px}
.review-item{background:#1e293b;border-radius:10px;padding:14px 16px;border:1px solid #7f1d1d}
.review-item .q{font-size:.85rem;color:#e2e8f0;margin-bottom:8px;line-height:1.6}
.review-item .your-ans{font-size:.78rem;color:#fca5a5;margin-bottom:4px}
.review-item .correct-ans{font-size:.78rem;color:#86efac}
</style>
</head>

<header>
  <div>

    <div class="q-header">
      <button class="btn btn-secondary" style="padding:5px 12px;font-size:.78rem" onclick="showTab('home')">← 戻る</button>

      <span class="q-count" id="qCount">1/1</span>

      <span class="q-tag" id="qCatTag"></span>
      <div class="q-num" id="qNum"></div>
      <div class="q-text" id="qText"></div>
      <div class="q-given" id="qGiven" style="display:none"></div>

    <div class="choices" id="choices"></div>
    <div class="hint-panel" id="hintPanel"><p id="hintText"></p></div>
    <div class="explanation" id="explanation"></div>
    <div class="nav-btns">
      <button class="btn btn-hint" id="hintBtn" onclick="toggleHint()">💡 ヒント</button>
      <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()" style="display:none">次の問題 →</button>
    </div>
  </div>

  <!-- RESULT -->
  <div id="screen-result" class="screen">
    <div class="result-card">
      <div class="result-score" id="resultScore"></div>
      <div class="result-label">正解率</div>

        <button class="btn btn-secondary" onclick="reviewWrong()" id="reviewBtn">間違い確認</button>
        <button class="btn btn-secondary" onclick="showTab('home')">カテゴリ選択</button>
      </div>
    </div>
  </div>

  <!-- FORMULAS -->
  <div id="screen-formulas" class="screen">
    <div class="formula-list" id="formulaList"></div>
  </div>

  <!-- WRONG REVIEW -->
  <div id="screen-review" class="screen">
    <div style="margin-bottom:14px;display:flex;align-items:center;justify-content:space-between">
      <h3 style="color:#60a5fa;font-size:.95rem">間違えた問題の復習</h3>
      <button class="btn btn-secondary" style="font-size:.78rem;padding:5px 12px" onclick="showTab('home')">← 戻る</button>
    </div>
    <div class="review-list" id="reviewList"></div>
  </div>
</div>

// =========================================================
// APP STATE
// =========================================================
const CATEGORIES = {};
Q.forEach(q => { CATEGORIES[q.cat] = CATEGORIES[q.cat]||[]; CATEGORIES[q.cat].push(q); });
CATEGORIES['全問ランダム'] = [...Q];

const CAT_META = {
  '操縦者の心得':   {icon:'📋',desc:'役割・責任・飛行前後の注意'},
  '航空法・規則':   {icon:'⚖️',desc:'航空法・飛行禁止法・電波法の規定'},
  '機体の特徴':     {icon:'🛸',desc:'機体種類・センサ・バッテリー'},
  '仕事率計算':     {icon:'⚙️',desc:'ペイロード搭載後の仕事率を求める'},

  'フレネルゾーン': {icon:'📡',desc:'通信に必要なアンテナ高さを求める'},
  '高度と速度':     {icon:'🌡️',desc:'空気密度の変化による必要速度'},
  '操縦・運航体制': {icon:'🚁',desc:'点検・申請・離着陸・緊急時対応'},
  '気象・リスク管理':{icon:'🌤️',desc:'気象知識・リスク評価・カテゴリーIII'},
  '全問ランダム':   {icon:'🎯',desc:'全カテゴリからランダム出題'},
};

let currentQuestions=[], currentIndex=0, correctCount=0, answered=false, currentCat='';
let wrongAnswers=[], sessionStats={total:0,correct:0};

// =========================================================
// BUILD HOME
// =========================================================
function buildHome(){
  const grid = document.getElementById('catGrid');
  grid.innerHTML='';
  Object.keys(CAT_META).forEach(cat=>{
    const m=CAT_META[cat];
    const cnt = CATEGORIES[cat]?CATEGORIES[cat].length:0;
    const card=document.createElement('div');
    card.className='cat-card';
    card.innerHTML=`<div class="icon">${m.icon}</div><h3>${cat}</h3><p>${m.desc}</p><div class="q-count">${cat==='全問ランダム'?Q.length+'問':cnt+'問'}</div>`;
    card.onclick=()=>startQuiz(cat);
    grid.appendChild(card);
  });
}

function updateStatBar(){
  const s=sessionStats;
  if(s.total===0){document.getElementById('stat-bar').style.display='none';return;}
  document.getElementById('stat-bar').style.display='flex';
  document.getElementById('stat-total').textContent=s.total;
  document.getElementById('stat-correct').textContent=s.correct;
  document.getElementById('stat-wrong').textContent=s.total-s.correct;
  document.getElementById('stat-pct').textContent=Math.round(s.correct/s.total*100)+'%';
}

// =========================================================
// QUIZ
// =========================================================
function shuffle(arr){return [...arr].sort(()=>Math.random()-.5)}

function startQuiz(cat){
  currentCat=cat;
  currentQuestions=shuffle(CATEGORIES[cat]||Q);
  currentIndex=0; correctCount=0;
  showTab('quiz');
  renderQuestion();
}

function retryQuiz(){startQuiz(currentCat)}

function renderQuestion(){
  const q=currentQuestions[currentIndex];
  answered=false;
  document.getElementById('hintPanel').classList.remove('show');
  document.getElementById('explanation').classList.remove('show');
  document.getElementById('explanation').innerHTML='';
  document.getElementById('nextBtn').style.display='none';

  const pct=(currentIndex/currentQuestions.length)*100;
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('qCount').textContent=(currentIndex+1)+' / '+currentQuestions.length;
  document.getElementById('qCatTag').textContent=q.tag;
  document.getElementById('qNum').textContent='Q'+(currentIndex+1);
  document.getElementById('qText').textContent=q.text;

  const ge=document.getElementById('qGiven');
  if(q.given){ge.style.display='block';ge.textContent=q.given}else{ge.style.display='none'}

  document.getElementById('hintText').textContent=q.hint||'ヒントはありません。';

  const ce=document.getElementById('choices');
  ce.innerHTML='';
  q.choices.forEach((c,i)=>{
    const btn=document.createElement('button');
    btn.className='choice-btn';
    btn.innerHTML=`<span class="choice-label">${['A','B','C','D'][i]}.</span>${c}`;
    btn.onclick=()=>selectAnswer(i);
    ce.appendChild(btn);
  });
}

function selectAnswer(idx){
  if(answered)return;
  answered=true;
  const q=currentQuestions[currentIndex];
  const btns=document.querySelectorAll('.choice-btn');
  btns.forEach(b=>b.disabled=true);

  sessionStats.total++;
  if(idx===q.answer){
    btns[idx].classList.add('correct');
    correctCount++;
    sessionStats.correct++;
  }else{
    btns[idx].classList.add('wrong');
    btns[q.answer].classList.add('reveal');
    wrongAnswers.push({q,yourIdx:idx});
  }
  updateStatBar();
  showExplanation(q);
  document.getElementById('nextBtn').style.display='inline-block';
}

function showExplanation(q){
  const el=document.getElementById('explanation');
  let html=`<h4>解説</h4>`;
  if(q.steps&&q.steps.length){
    q.steps.forEach((s,i)=>{
      html+=`<div class="step"><div class="step-num">${i+1}</div><div class="step-body">`;
      if(s.t)html+=`<strong>${s.t}</strong><br>`;
      if(s.b)html+=s.b;
      if(s.c)html+=`<span class="calc">${s.c}</span>`;
      html+='</div></div>';
    });
  }
  html+=`<div class="answer-highlight">正解：${q.ans}</div>`;
  el.innerHTML=html;
  el.classList.add('show');
}

function toggleHint(){document.getElementById('hintPanel').classList.toggle('show')}

function nextQuestion(){
  currentIndex++;
  if(currentIndex>=currentQuestions.length){showResult();}
  else{renderQuestion();}
}

function showResult(){
  const total=currentQuestions.length;
  const pct=Math.round(correctCount/total*100);
  document.getElementById('resultScore').textContent=pct+'%';
  document.getElementById('rCorrect').textContent=correctCount;
  document.getElementById('rTotal').textContent=total;
  document.getElementById('rWrong').textContent=total-correctCount;
  let msg='';
  if(pct>=90)msg='素晴らしい！合格レベルに達しています！';
  else if(pct>=70)msg='あと一息！苦手分野を公式集で復習しましょう。';
  else msg='基礎からしっかり復習しましょう。公式集と解説を活用してください。';
  document.getElementById('resultMsg').textContent=msg;
  document.getElementById('reviewBtn').style.display=wrongAnswers.length>0?'inline-block':'none';
  document.getElementById('screen-quiz').classList.remove('active');
  document.getElementById('screen-result').classList.add('active');
}

// =========================================================
// WRONG REVIEW
// =========================================================
function reviewWrong(){
  const el=document.getElementById('reviewList');
  if(wrongAnswers.length===0){el.innerHTML='<p style="color:#64748b;text-align:center;padding:20px">間違えた問題はありません！</p>';showTab('review');return;}
  el.innerHTML='';
  wrongAnswers.forEach(({q,yourIdx},i)=>{
    const d=document.createElement('div');
    d.className='review-item';
    d.innerHTML=`<div class="q-tag" style="margin-bottom:8px">${q.tag}</div>
    <div class="q" style="margin-bottom:8px">${q.text}</div>
    <div class="your-ans">✗ あなたの回答：${q.choices[yourIdx]}</div>
    <div class="correct-ans">✓ 正解：${q.ans}</div>`;
    el.appendChild(d);
  });
  showTab('review');
}

// =========================================================
// FORMULAS PAGE
// =========================================================
function buildFormulas(){
  const el=document.getElementById('formulaList');
  el.innerHTML='';
  FORMULAS.forEach(f=>{
    const d=document.createElement('div');
    d.className='formula-item';
    let html=`<h4>${f.title}</h4><div class="f-box">${f.formula}</div>`;
    if(f.formula2)html+=`<div class="f-box">${f.formula2}</div>`;
    if(f.note)html+=`<p>${f.note.replace(/\n/g,'<br>')}</p>`;
    if(f.ex)html+=`<div class="example">${f.ex.replace(/\n/g,'<br>')}</div>`;
    d.innerHTML=html;
    el.appendChild(d);
  });
}

// =========================================================
// TABS
// =========================================================
function showTab(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  const map={home:0,quiz:1,formulas:2,review:3};
  if(map[name]!==undefined)document.querySelectorAll('.tab')[map[name]]?.classList.add('active');
}

// INIT
buildHome();
buildFormulas();
</script>
